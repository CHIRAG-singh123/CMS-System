<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dynamic single-page CMS website ready to connect with a Laravel admin panel.">
    <meta name="theme-color" content="#112332">
    <title>CMS Single Page Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/site/styles.css">
</head>
<body>
    <noscript>
        <div class="noscript-banner">Enable JavaScript to render the CMS-driven content blocks.</div>
    </noscript>

    <div class="site-noise" aria-hidden="true"></div>

    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="#top" aria-label="Go to homepage">
                <span class="brand-mark">CX</span>
                <span class="brand-copy">
                    <span id="brand-name">CMS Site</span>
                    <span id="brand-tagline">Dynamic single page website</span>
                </span>
            </a>

            <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
                Menu
            </button>

            <nav class="site-nav" id="site-nav" aria-label="Primary navigation"></nav>

            <a class="header-cta" id="header-cta" href="#contact">Start a Project</a>
        </div>
    </header>

    <main id="top">
        <section class="hero section" id="hero"></section>
        <section class="section" id="about"></section>
        <section class="section section-accent" id="services"></section>
        <section class="section" id="process"></section>
        <section class="section section-dark" id="team"></section>
        <section class="section" id="testimonials"></section>
        <section class="section section-accent" id="contact"></section>
    </main>

    <footer class="site-footer" id="footer"></footer>

    <a class="whatsapp-fab" id="whatsapp-fab" href="#" target="_blank" rel="noreferrer" hidden>
        WhatsApp
    </a>

    <script>
        window.CMS_SITE_CONFIG = {
            useMockData: false,
            apiEndpoint: '/api/site/home',
            inquiryEndpoint: '/inquiries',
            baseUrl: '',
            mediaBaseUrl: '',
            ...(window.CMS_SITE_CONFIG || {}),
        };
    </script>
    <script src="/site/app.js" defer></script>
</body>
</html>
